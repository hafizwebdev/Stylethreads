<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Threads</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>

<body>

<header>
<h1>👕 Style Threads</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Profile</a>
<a href="#">Orders</a>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</nav>
</header>
<!-- AUTH SECTION -->
<section class="login-box">

<h2>Login / Signup</h2>

<input type="text" id="username" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="logout()">Logout</button>
<p id="userStatus"></p>

</section>

<!-- TOP BAR -->
<section class="top-bar">

  <input type="text" id="search" placeholder="Search Products..." onkeyup="searchProduct()">

  <div class="counts">
    <p>🛒 Cart: <span id="cart">0</span></p>
    <p>❤️ Wishlist: <span id="wishlist">0</span></p>
  </div>

</section>
<!-- PRODUCTS -->
<section id="products">

  <div id="productList"></div>

</section>

<section id="checkout">
<h2>🛍 Checkout</h2>
<p>Total Items: <span id="totalItems">0</span></p>
<button onclick="checkout()">Proceed to Checkout</button>
</section>
<section id="payment">
<h2>💳 Payment</h2>

<input type="text" id="cardName" placeholder="Card Holder Name">
<input type="text" id="cardNumber" placeholder="Card Number">
<input type="password" id="cvv" placeholder="CVV">

<button onclick="payNow()">Pay Now</button>
</section>

<section id="profile">
<h2>👤 User Profile</h2>

<p>Name: Admin</p>
<p>Email: admin@stylethreads.com</p>
<p>Member: Premium</p>
</section>
<footer>
<p>© 2026 Style Threads | All Rights Reserved</p>
</footer>

<script src="script.js"></script>

</body>
</html>
